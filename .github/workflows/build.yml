name: Build

on:
  push:
    branches: [master]
  release:
    types: [published]

permissions:
  contents: write-all

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download wc_profile from latest release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Download wc_profile from the most recent release that has it
          ASSET_URL=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | python3 -c "
import sys,json
releases=json.load(sys.stdin)
for r in releases:
    for a in r.get('assets',[]):
        if a['name']=='wc_profile.zip':
            print(a['browser_download_url'])
            sys.exit(0)
print('NOT_FOUND')
" 2>&1)
          if [ "$ASSET_URL" = "NOT_FOUND" ]; then
            echo "wc_profile.zip not in any release — creating placeholder"
            mkdir -p wc_profile
          else
            echo "Downloading wc_profile from: $ASSET_URL"
            curl -sL -o wc_profile.zip "$ASSET_URL"
            unzip -q wc_profile.zip || mkdir -p wc_profile
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create empty wc_profile for branch builds
        if: startsWith(github.ref, 'refs/heads/')
        run: mkdir -p wc_profile

      - name: Install dependencies
        run: npm install

      - name: Build macOS (x64 + arm64)
        run: npx electron-builder --mac zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-build
          path: release/
          retention-days: 14

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download wc_profile from latest release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $headers = @{
            "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            "Accept" = "application/vnd.github+json"
          }
          $releases = curl.exe -sL -H @headers "https://api.github.com/repos/${{ github.repository }}/releases" | python3 -c "
import sys,json
releases=json.load(sys.stdin)
for r in releases:
    for a in r.get('assets',[]):
        if a['name']=='wc_profile.zip':
            print(a['"'"'browser_download_url'"'"'])
            sys.exit(0)
print('"'"'NOT_FOUND'"'"')
"
          if ($releases -eq "NOT_FOUND") {
            echo "wc_profile.zip not in any release — creating placeholder"
            New-Item -ItemType Directory -Force wc_profile | Out-Null
          } else {
            echo "Downloading wc_profile from: $releases"
            curl.exe -sL -o wc_profile.zip "$releases"
            Expand-Archive -Force wc_profile.zip . -ErrorAction SilentlyContinue
            if (-not (Test-Path wc_profile)) { New-Item -ItemType Directory -Force wc_profile | Out-Null }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create empty wc_profile for branch builds
        if: startsWith(github.ref, 'refs/heads/')
        run: New-Item -ItemType Directory -Force wc_profile | Out-Null

      - name: Install dependencies
        run: npm install

      - name: Build Windows zip
        run: npx electron-builder --win zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-build
          path: release/
          retention-days: 14
