<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WhaleComment 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px}
h1{color:#ff2d55;margin-bottom:20px}
.card{background:#1a1a2e;border:1px solid #252540;border-radius:10px;padding:20px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #252540}
th{color:#888;font-size:12px}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-on{background:#00ff8844;color:#00ff88}.badge-off{background:#ff444444;color:#ff4444}
input{padding:8px 12px;border:1px solid #252540;border-radius:6px;background:#0f0f1a;color:#fff;margin-right:8px;margin-bottom:8px}
button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;margin-right:4px}
.btn-new{background:#ff2d55;color:#fff}.btn-refresh{background:#333;color:#ccc}
.btn-copy{background:#1a6b3c;color:#fff;font-size:11px}.btn-pause{background:#d2991d;color:#fff;font-size:11px}.btn-delete{background:#ff4444;color:#fff;font-size:11px}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;display:none;z-index:999}
</style>
</head>
<body>
<h1>🐋 WhaleComment 管理后台</h1>
<div class="card">
<h2 style="margin-bottom:16px">创建运营账号</h2>
<input id="name" placeholder="姓名" style="width:150px"><input id="limit" type="number" value="100" style="width:80px"><input id="days" type="number" value="30" style="width:80px">
<button class="btn-new" onclick="create()">创建运营账号</button>
</div>
<div class="card">
<h2 style="margin-bottom:16px">运营列表 <button class="btn-refresh" onclick="load()">🔄</button></h2>
<table><thead><tr><th>姓名</th><th>Token</th><th>状态</th><th>配额</th><th>到期</th><th>操作</th></tr></thead>
<tbody id="list"><tr><td colspan="6" style="color:#666;text-align:center">加载中...</td></tr></tbody></table>
</div>
<div class="toast" id="toast"></div>
<script>
var SUPA='https://sxsmjfkxllepntgzfqbl.supabase.co';
var KEY='sb_publishable_d30e83ittDALlQtv0nJF4w_Cz7xpTLt';
var TABLE='operator_tokens';
async function api(method,path,body){
var h={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
var r=await fetch(SUPA+path,{method:method,headers:h,body:body?JSON.stringify(body):undefined});
return r.json();
}
function token(){var a='0123456789abcdef',t='wc_op_';for(var i=0;i<40;i++)t+=a[Math.floor(Math.random()*16)];return t}
async function load(){
var d=await api('GET','/rest/v1/'+TABLE+'?select=*&order=created.desc');
var rows=Array.isArray(d)?d:(d.data||[]);
var h='';
if(!rows.length)h='<tr><td colspan="6" style="color:#666;text-align:center">暂无运营</td></tr>';
rows.forEach(function(o){
var on=o.active!==false;
h+='<tr><td>'+o.name+'</td>';
h+='<td><code style="font-size:11px">'+o.token+'</code> <button class="btn-copy" onclick="copy(\''+o.token+'\')">📋</button></td>';
h+='<td><span class="badge '+(on?'badge-on':'badge-off')+'">'+(on?'启用':'停用')+'</span></td>';
h+='<td>'+o.daily_limit+' <button class="btn-copy" onclick="editLimit(\''+o.token+'\','+o.daily_limit+')" style="font-size:10px;padding:1px 4px">✏️</button></td>';
h+='<td>'+new Date(new Date(o.created).getTime()+o.valid_days*86400000).toLocaleDateString('zh-CN')+' <button class="btn-copy" onclick="editDays(\''+o.token+'\','+o.valid_days+')" style="font-size:10px;padding:1px 4px">✏️</button></td>';
h+='<td><button class="btn-pause" onclick="toggle(\''+o.token+'\','+!on+')">'+(on?'暂停':'恢复')+'</button> <button class="btn-delete" onclick="del(\''+o.token+'\')">删除</button></td></tr>';
});
document.getElementById('list').innerHTML=h;
}
async function create(){
var n=document.getElementById('name').value.trim();if(!n)return toast('请输入姓名');
var t=token();
var op={token:t,name:n,daily_limit:parseInt(document.getElementById('limit').value)||100,valid_days:parseInt(document.getElementById('days').value)||30,created:new Date().toISOString(),active:true};
var d=await api('POST','/rest/v1/'+TABLE,op);
if(d&&!d.error){toast('创建成功！Token: '+t);document.getElementById('name').value='';load()}else toast('失败');
}
function copy(t){navigator.clipboard.writeText(t).then(function(){toast('已复制!')})}
async function toggle(t,on){await api('PATCH','/rest/v1/'+TABLE+'?token=eq.'+encodeURIComponent(t),{active:on});load()}
async function del(t){if(!confirm('确定删除?'))return;await api('DELETE','/rest/v1/'+TABLE+'?token=eq.'+encodeURIComponent(t));load()}
async function editLimit(t,c){var v=prompt('新每日配额:',c);if(!v||isNaN(v))return;await api('PATCH','/rest/v1/'+TABLE+'?token=eq.'+encodeURIComponent(t),{daily_limit:parseInt(v)});load()}
async function editDays(t,c){var v=prompt('新有效天数:',c);if(!v||isNaN(v))return;await api('PATCH','/rest/v1/'+TABLE+'?token=eq.'+encodeURIComponent(t),{valid_days:parseInt(v)});load()}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},3000)}
load();
</script>
</body>
</html>
