<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>WhaleComment Admin</title>
<style>body{font-family:sans-serif;background:#0f0f1a;color:#fff;padding:20px}
h1{color:#ff2d55}input,button{padding:8px;margin:4px;border-radius:4px;border:1px solid #333;background:#1a1a2e;color:#fff}
button{background:#ff2d55;cursor:pointer}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #333}
.msg{position:fixed;bottom:20px;right:20px;background:#333;padding:12px 20px;border-radius:8px;display:none;z-index:999}</style></head>
<body>
<h1>🐋 WhaleComment Admin</h1>
<div>
<input id="name" placeholder="Name"><input id="limit" type="number" value="100"><input id="days" type="number" value="30">
<button onclick="create()">Create</button>
</div>
<div id="list" style="margin-top:20px">Loading...</div>
<div class="msg" id="msg"></div>
<script>
var T='wc_admin_2026_secret_token';
function msg(m,t){var e=document.getElementById('msg');e.textContent=m;e.style.display='block';setTimeout(function(){e.style.display='none'},t||3000)}
async function load(){try{var r=await fetch("/api/admin/ops");var d=await r.json();var ops=d.operators||[];var h="<table><tr><th>Name</th><th>Token</th><th>Status</th><th>Actions</th></tr>";ops.forEach(function(o){h+="<tr><td>"+o.name+"</td><td><code>"+o.token+"</code></td><td>"+(o.active!==false?'Active':'Suspended')+"</td><td><button onclick=\"toggle('"+o.token+"',"+(o.active===false)+")\">"+(o.active!==false?'Pause':'Resume')+"</button> <button onclick=\"del('"+o.token+"')\">Delete</button></td></tr>"});h+="</table>";if(!ops.length)h="No operators";document.getElementById('list').innerHTML=h}catch(e){document.getElementById('list').innerHTML="Error: "+e.message}}
async function create(){var n=document.getElementById('name').value.trim();if(!n)return msg('Enter name');try{var r=await fetch("/api/admin/ops",{method:"POST",headers:{"x-admin-token":T,"Content-Type":"application/json"},body:JSON.stringify({name:n,daily_limit:parseInt(document.getElementById('limit').value)||100,valid_days:parseInt(document.getElementById('days').value)||30})});var d=await r.json();if(d.success){msg('Created: '+d.operator.token);document.getElementById('name').value='';load()}else{msg('Failed: '+(d.error||'unknown'))}}catch(e){msg('Error: '+e.message)}}
async function toggle(t,a){await fetch("/api/admin/ops/"+t,{method:"PATCH",headers:{"x-admin-token":T,"Content-Type":"application/json"},body:JSON.stringify({active:a})});load()}
async function del(t){if(!confirm('Delete?'))return;await fetch("/api/admin/ops/"+t,{method:"DELETE",headers:{"x-admin-token":T}});load()}
load();
</script>
</body></html>
