<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>WhaleComment Admin</title><style>body{font-family:sans-serif;background:#0f0f1a;color:#fff;padding:20px}h1{color:#ff2d55}input,button{padding:8px;margin:4px;border-radius:4px;border:1px solid #333;background:#1a1a2e;color:#fff}button{background:#ff2d55;cursor:pointer}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #333}.toast{position:fixed;bottom:20px;right:20px;background:#333;padding:12px;border-radius:8px;display:none}</style></head><body><h1>🐋 WhaleComment Admin</h1><div><input id="name" placeholder="Name"><input id="limit" type="number" value="100"><input id="days" type="number" value="30"><button id="btnCreate" onclick="create()">Create Operator</button></div><div id="list" style="margin-top:20px">Loading...</div><div class="toast" id="toast"></div><script>var T="wc_admin_2026_secret_token";function toast(m){var e=document.getElementById("toast");e.textContent=m;e.style.display="block";setTimeout(function(){e.style.display="none"},3000)}async function load(){try{var r=await fetch("/api/admin/operators",{headers:{"x-admin-token":T}});var d=await r.json();var ops=d.operators||[];var h="<table><tr><th>Name</th><th>Token</th><th>Status</th><th>Quota</th><th>Actions</th></tr>";ops.forEach(function(o){h+="<tr><td>"+o.name+"</td><td><code>"+o.token+"</code> <button onclick=copy(\""+o.token+"\")>📋</button></td><td>"+(o.active!==false?"Active":"Suspended")+"</td><td>"+(o.daily_limit||100)+"</td><td>"+(o.active!==false?'<button onclick=toggle(\""+o.token+"\",false)>Pause</button>':'<button onclick=toggle(\""+o.token+"\",true)>Resume</button>')+" <button onclick=del(\""+o.token+"\")>Delete</button></td></tr>"});h+="</table>";if(!ops.length)h="No operators found";document.getElementById("list").innerHTML=h}catch(e){document.getElementById("list").innerHTML="Error: "+e.message}}async function create(){var n=document.getElementById("name").value;if(!n)return toast("Enter name");var r=await fetch("/api/admin/operators",{method:"POST",headers:{"x-admin-token":T,"Content-Type":"application/json"},body:JSON.stringify({name:n,daily_limit:parseInt(document.getElementById("limit").value)||100,valid_days:parseInt(document.getElementById("days").value)||30})});var d=await r.json();if(d.success){toast("Created! Token: "+d.operator.token);document.getElementById("name").value="";load()}else toast("Failed: "+(d.error||""))}async function toggle(t,a){await fetch("/api/admin/operators/"+t,{method:"PATCH",headers:{"x-admin-token":T,"Content-Type":"application/json"},body:JSON.stringify({active:a})});load()}async function del(t){if(!confirm("Delete?"))return;await fetch("/api/admin/operators/"+t,{method:"DELETE",headers:{"x-admin-token":T}});load()}function copy(t){navigator.clipboard.writeText(t);toast("Copied!")}load();</script></body></html>
