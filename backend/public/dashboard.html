<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WhaleComment — Auto Comment Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0b0f;--card:#13141f;--border:#1e2040;--text:#d0d0e0;--muted:#666;--green:#00ff88;--blue:#00bfff;--red:#ff4444;--purple:#7c3aed;--gold:#f59e0b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0d0d1a 0%,#1a1040 100%);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--green),#00cc6a);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#0a0b0f}
.header h1{font-size:18px;color:#fff}
.header .sub{font-size:11px;color:var(--muted)}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--green);color:#0a0b0f}
.btn-primary:hover:not(:disabled){background:#00cc6a}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover:not(:disabled){border-color:var(--green);color:var(--green)}
.btn-sm{padding:4px 10px;font-size:11px}
.layout{display:flex;height:calc(100vh - 73px)}
.sidebar{width:280px;border-right:1px solid var(--border);background:#0d0d1a;overflow-y:auto;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h3{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.host-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .2s;display:flex;align-items:center;gap:10px}
.host-item:hover{background:rgba(255,255,255,.03)}
.host-item.active{background:rgba(0,255,136,.05);border-left:3px solid var(--green)}
.host-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.online{background:var(--green);box-shadow:0 0 6px rgba(0,255,136,.4)}
.dot.offline{background:var(--red)}
.dot.running{background:var(--blue);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.host-item .info{flex:1;min-width:0}
.host-item .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.host-item .handle{font-size:11px;color:var(--muted)}
.host-item .count{font-size:10px;color:var(--muted)}
.main{flex:1;overflow-y:auto;padding:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card .value{font-size:28px;font-weight:700;color:#fff}
.stat-card .sub{font-size:11px;color:var(--muted);margin-top:4px}
.section{margin-bottom:24px}
.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.progress-section{margin:16px 0}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),#00cc6a);transition:width .5s ease}
.progress-fill.warn{background:linear-gradient(90deg,var(--gold),#f97316)}
.task-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px}
.task-row .whale{font-weight:600;color:#fff}
.task-row .persona{font-size:10px;padding:2px 8px;border-radius:12px;background:rgba(124,58,237,.15);color:var(--purple)}
.badge-status{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500}
.badge-status.done{background:rgba(0,255,136,.1);color:var(--green)}
.badge-status.running{background:rgba(0,191,255,.1);color:var(--blue)}
.badge-status.failed{background:rgba(255,68,68,.1);color:var(--red)}
.badge-status.wait{background:rgba(245,158,11,.1);color:var(--gold)}
.log-row{padding:6px 0;font-size:11px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.02);display:flex;gap:10px}
.log-row .time{color:var(--muted);white-space:nowrap}
.log-row .msg{flex:1}
.log-row.success .msg{color:var(--green)}
.log-row.error .msg{color:var(--red)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:440px}
.modal h3{font-size:16px;color:#fff;margin-bottom:16px}
.input{width:100%;padding:10px 14px;background:#0d0d1a;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;margin-bottom:12px}
.input:focus{outline:none;border-color:var(--green)}
.input::placeholder{color:var(--muted)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.flex-row{display:flex;gap:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
@media(max-width:768px){.layout{flex-direction:column}.sidebar{width:100%;max-height:200px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🐋</div>
    <div>
      <h1>WhaleComment</h1>
      <div class="sub">TikTok Auto Comment System</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:12px;color:var(--muted)" id="op-name"></span>
    <a href="/admin.html" class="btn btn-outline btn-sm" style="text-decoration:none">🔑 Token</a>
    <button class="btn btn-outline btn-sm" onclick="logout()">Keluar</button>
  </div>
</div>

<div class="layout" id="app-layout" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>📱 Host Saya</h3>
      <button class="btn btn-primary btn-sm" style="width:100%;justify-content:center" onclick="showAddHost()">+ Tambah Host</button>
    </div>
    <div id="host-list"></div>
  </div>

  <div class="main" id="main-content">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Komentar Hari Ini</div><div class="value" id="stat-today">0</div><div class="sub" id="stat-limit">dari 30 limit</div></div>
      <div class="stat-card"><div class="label">Tingkat Sukses</div><div class="value" id="stat-rate">-</div><div class="sub">7 hari terakhir</div></div>
      <div class="stat-card"><div class="label">Host Aktif</div><div class="value" id="stat-active">0</div><div class="sub">sedang berjalan</div></div>
    </div>

    <!-- Detail -->
    <div class="section">
      <div class="section-title">🎯 Host Detail</div>
      <div class="card" id="host-detail">
        <div class="empty-state"><div class="icon">📱</div><p>Pilih host dari sidebar untuk melihat detail</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Login screen -->
<div id="login-screen" style="display:none;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px">
  <div class="logo" style="width:64px;height:64px;font-size:32px">🐋</div>
  <h2 style="color:#fff">WhaleComment</h2>
  <p style="color:var(--muted);margin-bottom:24px">Masuk dengan email untuk mulai</p>
  <div style="width:90%;max-width:360px">
    <input class="input" id="login-email" type="email" placeholder="Email anda..." style="margin-bottom:8px">
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="sendOTP()" id="btn-send-otp">Kirim Kode OTP</button>
  </div>
  <div id="otp-section" style="display:none;width:90%;max-width:360px;margin-top:8px">
    <input class="input" id="login-otp" type="text" placeholder="6-digit kode..." maxlength="6" style="margin-bottom:8px">
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="verifyOTP()">Verifikasi</button>
  </div>
  <div id="login-msg" style="font-size:12px;color:var(--muted);margin-top:8px"></div>
</div>

<!-- Add Host Modal -->
<div class="modal-overlay" id="add-host-modal">
  <div class="modal">
    <h3>Tambah Host Baru</h3>
    <input class="input" id="new-host-name" placeholder="Nama host...">
    <input class="input" id="new-host-tiktok" placeholder="@username TikTok...">
    <div class="flex-row mt-12">
      <button class="btn btn-outline" style="flex:1;justify-content:center" onclick="closeAddHost()">Batal</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="addHost()">Simpan</button>
    </div>
  </div>
</div>

<script>
// Config
const API = '';
const SUPABASE_URL = 'https://sxsmjfkxllepntgzfqbl.supabase.co';
const SUPABASE_ANON = 'sb_publishable_d30e83ittDALlQtv0nJF4w_Cz7xpTLt';
let operator = null;
let hosts = [];
let selectedHostId = null;
let refreshTimer = null;

// Init
(async () => {
  const stored = localStorage.getItem('wc_operator');
  if (stored) {
    try { operator = JSON.parse(stored); showApp(); } catch(e) { localStorage.removeItem('wc_operator'); showLogin(); }
  } else {
    showLogin();
  }
})();

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-layout').style.display = 'none';
  var inner = document.querySelector('.layout');
  if (inner) inner.style.display = 'none';
}

// Auth
async function sendOTP() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return;
  const msgEl = document.getElementById('login-msg');
  const btn = document.getElementById('btn-send-otp');
  btn.disabled = true;
  btn.textContent = 'Mengirim...';
  msgEl.textContent = '';
  try {
    const r = await fetch(API + '/api/auth/send-otp', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
    const d = await r.json();
    if (d.success) {
      document.getElementById('otp-section').style.display = 'block';
      document.getElementById('login-msg').innerHTML = 'Kode OTP: <b style="font-size:24px;color:#00ff88;letter-spacing:4px">' + d.code + '</b><br><small>Masukkan kode di atas</small>';
      document.getElementById('login-msg').style.color = 'var(--green)';
    }
  } catch(e) {
    console.error('OTP error:', e);
    msgEl.innerHTML = 'Gagal koneksi ke server.<br><small>Pastikan backend berjalan: ' + API + '</small>';
    msgEl.style.color = 'var(--red)';
  }
  document.getElementById('btn-send-otp').disabled = false;
  document.getElementById('btn-send-otp').textContent = 'Kirim Kode OTP';
}

async function verifyOTP() {
  const email = document.getElementById('login-email').value.trim();
  const code = document.getElementById('login-otp').value.trim();
  if (!email || !code) return;
  try {
    const r = await fetch(API + '/api/auth/verify-otp', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,code}) });
    const d = await r.json();
    if (d.success && d.user) {
      operator = d.user;
      localStorage.setItem('wc_operator', JSON.stringify(operator));
      showApp();
    } else {
      document.getElementById('login-msg').textContent = d.error || 'Gagal';
      document.getElementById('login-msg').style.color = 'var(--red)';
    }
  } catch(e) {
    console.error('Verify error:', e);
    var mel = document.getElementById('login-msg');
    mel.innerHTML = 'Gagal koneksi.<br><small>' + e.message + '</small>';
    mel.style.color = 'var(--red)';
  }
}

function logout() {
  localStorage.removeItem('wc_operator');
  operator = null;
  hosts = [];
  selectedHostId = null;
  if (refreshTimer) clearInterval(refreshTimer);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-layout').style.display = 'none';
}

// App
async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  var appLayout = document.getElementById('app-layout');
  if (appLayout) appLayout.style.display = 'flex';
  var inner = document.querySelector('.layout');
  if (inner) inner.style.display = 'flex';
  document.getElementById('op-name').textContent = operator.display_name || operator.email;
  await loadHosts();
  if (refreshTimer) clearInterval(refreshTimer); refreshTimer = setInterval(loadHosts, 3000);
}

async function loadHosts() {
  if (!operator) return;
  
  // Always read from localStorage first
  var saved = localStorage.getItem('wc_hosts');
  if (saved) {
    try { hosts = JSON.parse(saved); } catch(e) { hosts = []; }
  } else {
    hosts = [];
  }
  
  // Try to merge with backend status
  try {
    const r = await fetch(API + '/api/hosts?operator_id=' + operator.id);
    const d = await r.json();
    if (d.success && d.hosts) {
      for (var i = 0; i < d.hosts.length; i++) {
        var bh = d.hosts[i];
        var local = hosts.find(function(h) { return h.id === bh.id || h.tiktok_username === bh.tiktok_username; });
        if (local) {
          // Merge backend status into local
          local.status = bh.status || local.status;
          local.is_logged_in = bh.is_logged_in || local.is_logged_in;
        } else {
          hosts.push(bh);
        }
      }
    }
  } catch(e) {}
  
  saveHostsLocal();
  renderHostList();
  if (selectedHostId) renderHostDetail();
  updateStats();
}

function saveHostsLocal() {
  localStorage.setItem('wc_hosts', JSON.stringify(hosts));
}

function renderHostList() {
  const el = document.getElementById('host-list');
  if (!hosts.length) {
    el.innerHTML = '<div class="empty-state" style="padding:20px"><div class="icon" style="font-size:24px">📋</div><p style="font-size:12px">Belum ada host</p></div>';
    return;
  }
  el.innerHTML = hosts.map(h => {
    const cls = selectedHostId === h.id ? ' active' : '';
    const dotCls = h.status === 'online' || h.status === 'running' ? (h.status === 'running' || h.daily_comment_count > 0 ? 'running' : 'online') : 'offline';
    const today = h.daily_comment_date === new Date().toISOString().split('T')[0] ? h.daily_comment_count : 0;
    return '<div class="host-item' + cls + '" onclick="selectHost(\'' + h.id + '\')">'
      + '<div class="dot ' + dotCls + '"></div>'
      + '<div class="info"><div class="name">' + esc(h.display_name || h.tiktok_username) + '</div><div class="handle">@' + esc(h.tiktok_username) + '</div></div>'
      + '<div class="count">' + today + '/' + (h.daily_comment_limit || 30) + '</div>'
      + '</div>';
  }).join('');
}

function selectHost(id) {
  selectedHostId = id;
  renderHostList();
  renderHostDetail();
}

async function renderHostDetail() {
  const el = document.getElementById('host-detail');
  const h = hosts.find(x => x.id === selectedHostId);
  if (!h) { el.innerHTML = '<div class="empty-state"><p>Host tidak ditemukan</p></div>'; return; }
  const today = h.daily_comment_date === new Date().toISOString().split('T')[0] ? (h.daily_comment_count || 0) : 0;
  const limit = h.daily_comment_limit || 30;
  const pct = Math.round(today / limit * 100);
  const statusBadge = h.status === 'running' ? '<span class="badge-status" style="color:#00bfff">🟢 Running</span>' : h.status === 'online' ? '<span class="badge-status done">Online</span>' : '<span class="badge-status failed">Offline</span>';

  let html = '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">';
  html += '<div><h3 style="color:#fff;font-size:18px">' + esc(h.display_name || h.tiktok_username) + '</h3>';
  html += '<div style="font-size:13px;color:var(--muted)">@' + esc(h.tiktok_username) + ' ' + statusBadge + '</div></div>';
  html += '<div class="flex-row">';
  const isOnline = h.status === 'online' || h.status === 'running' || h.is_logged_in;
  if (!isOnline) {
    html += '<button class="btn btn-primary btn-sm" onclick="startQRLogin(\'' + h.id + '\')">📱 QR Login</button>';
  html += ' <button class="btn btn-sm" style="background:#666;font-size:11px" onclick="forceOnline(\'' + h.id + '\')" title="Skip QR, set as logged in">⚡Skip</button>';
  } else {
    html += '<button class="btn btn-primary btn-sm" onclick="generateTasks(\'' + h.id + '\')" style="background:#8b5cf6">🎯 Generate Tasks</button>';
    if (h.status === 'running') {
      html += '<button class="btn btn-stop btn-sm" onclick="stopHost(\'' + h.id + '\')">⏹ Stop</button>';
    } else {
      html += '<button class="btn btn-start btn-sm" onclick="startHost(\'' + h.id + '\')">▶ Start</button>';
    }
  }
  html += '<button class="btn btn-outline btn-sm" onclick="deleteHost(\'' + h.id + '\')">🗑</button>';
  html += '</div></div>';
  if (h.host_token) {
    html += '<div style="margin-top:12px;padding:8px 12px;background:#0f0f1a;border-radius:6px;font-size:11px">';
    html += '<span style="color:#888">Token: </span><code style="color:#00ff88;word-break:break-all">' + h.host_token + '</code>';
    html += ' <button class="btn btn-sm" style="background:#333;font-size:10px;padding:2px 8px" onclick="copyToken(\'' + h.host_token + '\')">📋 Copy</button>';
    html += ' <button class="btn btn-sm" style="background:#ff2d55;font-size:10px;padding:2px 8px" onclick="revokeToken(\'' + h.id + '\')">🔄 Revoke</button>';
    html += '</div>';
  }
  html += '</div></div>';

  html += '<div class="progress-section"><div class="progress-label"><span>Progress Komentar Hari Ini</span><span>' + today + ' / ' + limit + '</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill' + (pct > 80 ? ' warn' : '') + '" style="width:' + pct + '%"></div></div></div>';

  // Tasks
  try {
    const r = await fetch(API + '/api/tasks/progress?host_id=' + h.id);
    const d = await r.json();
    if (d.success) {
      html += '<div class="section-title mt-16">📝 Tasks</div>';
      html += '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">Total: ' + d.total + ' | Selesai: ' + d.completed + ' | Gagal: ' + d.failed + ' | Pending: ' + d.pending + '</div>';
    }
  } catch(e) {}

  // Recent logs
  try {
    const r2 = await fetch(API + '/api/stats?host_id=' + h.id + '&days=1');
    const d2 = await r2.json();
    if (d2.success && d2.recent && d2.recent.length) {
      html += '<div class="section-title mt-16">📜 Aktivitas Terbaru</div>';
      d2.recent.slice(0, 10).forEach(l => {
        const cls = l.action === 'comment_success' ? ' success' : (l.action === 'comment_fail' ? ' error' : '');
        const time = new Date(l.created_at).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
        html += '<div class="log-row' + cls + '"><span class="time">' + time + '</span><span class="msg">' + esc(l.action) + (l.whale_username ? ' → @' + l.whale_username : '') + '</span></div>';
      });
    }
  } catch(e) {}

  el.innerHTML = html;
}

function updateStats() {
  let totalToday = 0, activeCount = 0;
  const today = new Date().toISOString().split('T')[0];
  hosts.forEach(h => {
    if (h.daily_comment_date === today) totalToday += (h.daily_comment_count || 0);
    if (h.status === 'online') activeCount++;
  });
  document.getElementById('stat-today').textContent = totalToday;
  document.getElementById('stat-limit').textContent = 'dari ' + (hosts.length * 30) + ' limit';
  document.getElementById('stat-active').textContent = activeCount;
  document.getElementById('stat-rate').textContent = '-';
}

// Host management
function showAddHost() {
  document.getElementById('add-host-modal').classList.add('show');
}
function closeAddHost() {
  document.getElementById('add-host-modal').classList.remove('show');
  document.getElementById('new-host-name').value = '';
  document.getElementById('new-host-tiktok').value = '';
}
async function addHost() {
  var name = document.getElementById('new-host-name').value.trim();
  var username = document.getElementById('new-host-tiktok').value.trim();
  if (!name || !username) { alert('Nama dan username harus diisi'); return; }
  
  var host = {
    id: 'h_' + Date.now(),
    operator_id: operator.id,
    tiktok_username: username,
    display_name: name,
    status: 'offline',
    is_logged_in: false,
    daily_comment_count: 0,
    daily_comment_limit: 30,
    daily_comment_date: new Date().toISOString().split('T')[0],
    created_at: new Date().toISOString()
  };
  
  hosts.push(host);
  saveHostsLocal();
  
  // Try backend (non-blocking)
  try {
    fetch(API + '/api/hosts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ operator_id: operator.id, tiktok_username: username, display_name: name })
    });
  } catch(e) {}
  
  renderHostList();
  selectedHostId = host.id;
  renderHostDetail();
  document.getElementById('add-host-modal').style.display = 'none';
  document.getElementById('new-host-name').value = '';
  document.getElementById('new-host-tiktok').value = '';
}
async function startQRLogin(hostId) {
  const host = hosts.find(h => h.id === hostId);
  const hostName = host ? (host.name || host.hostname || hostId) : hostId;
  const url = 'https://www.tiktok.com/login?wc_host=' + encodeURIComponent(hostId) + '&wc_name=' + encodeURIComponent(hostName);
  window.open(url, '_blank', 'width=500,height=700');
  alert('Jendela login TikTok dibuka. Silakan scan QR code dengan HP TikTok host: ' + hostName + '. Setelah login berhasil, extension akan otomatis menyimpan session.');
}

async function deleteHost(hostId) {
  if (!confirm('Hapus host ini?')) return;
  try {
    await fetch(API + '/api/hosts/' + hostId, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'deleted'}) });
    selectedHostId = null;
    await loadHosts();
  } catch(e) { alert('Error: ' + e.message); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

async function startHost(hostId) {
  var host = hosts.find(function(h) { return h.id === hostId; });
  if (host) { host.status = 'running'; saveHostsLocal(); }
  try {
    fetch(API + '/api/hosts/' + hostId + '/start', { method: 'POST' });
  } catch(e) {}
  // Open TikTok with auto-start parameter
  window.open('https://www.tiktok.com/foryou?wc_auto=' + hostId, '_blank');
  renderHostList();
  renderHostDetail();
}

async function generateTasks(hostId) {
  try {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Generating...';
    const r = await fetch(API + '/api/hosts/' + hostId + '/generate-tasks', { 
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({limit: 30})
    });
    const d = await r.json();
    btn.disabled = false;
    btn.textContent = '🎯 Generate Tasks';
    alert('Generated ' + (d.count || 0) + ' tasks from ' + (d.total || 0) + ' whales!');
    renderHostDetail();
  } catch(e) { alert('Error: ' + e.message); }
}

async function stopHost(hostId) {
  var host = hosts.find(function(h) { return h.id === hostId; });
  if (host) { host.status = 'online'; saveHostsLocal(); }
  try {
    fetch(API + '/api/hosts/' + hostId + '/stop', { method: 'POST' });
  } catch(e) {}
  renderHostList();
  renderHostDetail();
}


function forceOnline(hostId) {
  var host = hosts.find(function(h) { return h.id === hostId; });
  if (host) {
    host.status = 'online';
    host.is_logged_in = true;
    saveHostsLocal();
    renderHostList();
    renderHostDetail();
  }
}


function copyToken(token) {
  navigator.clipboard.writeText(token).then(function() { alert('Token copied!'); });
}

async function revokeToken(hostId) {
  if (!confirm('Revoke token? Old token will stop working immediately.')) return;
  try {
    var r = await fetch(API + '/api/hosts/' + hostId + '/regenerate-token', { method: 'POST' });
    var d = await r.json();
    if (d.success) {
      alert('New token: ' + d.host_token);
      loadHosts();
    }
  } catch(e) { alert('Error: ' + e.message); }
}
