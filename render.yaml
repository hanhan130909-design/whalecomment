services:
  - type: web
    name: whalecomment-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /api/version/latest
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_TOKEN
        value: wc_admin_2026_secret_token
      - key: ARK_API_KEY
        sync: false
