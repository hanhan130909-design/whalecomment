# Render Blueprint ‚Ä?WhaleComment Backend
# Deploy: New ‚Ü?Blueprint ‚Ü?connect this repo ‚Ü?selects this file
# Render auto-detects: Node.js, rootDir=backend/, start=node server.js
# Updated: 2026-07-12 v1.2.2 ‚Ä?fixed generate-tasks route + app. prefix + app.app. bug

services:
  - type: web
    name: whalecomment-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /api/version/latest
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_TOKEN
        value: wc_admin_2026_secret_token
      - key: ARK_API_KEY
        sync: false
